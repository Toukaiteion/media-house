version: '3.8'

services:
  backend:
    build:
      context: ./media-house-admin
      dockerfile: Dockerfile
    container_name: mediahouse-backend
    ports:
      - "5000:8080"
    volumes:
      - /path/to/your/media:/media:ro
      - ./data:/app/data
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Database__Path=/app/data/mediahouse.db
    restart: unless-stopped

  frontend:
    build:
      context: ./media-house-view
      dockerfile: Dockerfile
    container_name: mediahouse-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      - VITE_API_BASE_URL=http://localhost:5000/api
    restart: unless-stopped

volumes:
  data:
